<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Exam Timer</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #111;
      color: #fff;
      margin: 0;
    }

    .container {
      display: flex;
      justify-content: center;
      gap: 40px;
      margin: 20px;
    }

    .box {
      border: 2px solid #fff;
      padding: 20px;
      width: 200px;
      border-radius: 10px;
    }

    .active {
      background-color: #2ecc71;
      color: #000;
    }

    .timer {
      font-size: 70px;
      margin: 20px 0;
    }

    button {
      margin: 8px;
      padding: 12px 18px;
      font-size: 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: #3498db;
      color: white;
    }

    .play { background: #2ecc71; color: black; }
    .control { background: #e74c3c; }
    .secondary { background: #555; }

    input {
      padding: 10px;
      margin: 5px;
      width: 120px;
      text-align: center;
      border-radius: 6px;
      border: none;
    }

    .input-grid {
      display: flex;
      justify-content: center;
      gap: 40px;
    }

    /* 🔒 EXAM LOCK SCREEN */
    #overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.85);
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      z-index: 999;
    }
  </style>
</head>
<body>

<div id="overlay">EXAM MODE ACTIVE</div>

<h1>Exam Timer</h1>

<div class="container">
  <div id="readingBox" class="box">
    <h2>Reading</h2>
    <p id="readingTime">00:00</p>
  </div>

  <div id="writingBox" class="box">
    <h2>Writing</h2>
    <p id="writingTime">00:00</p>
  </div>
</div>

<div class="timer" id="mainTimer">00:00</div>

<!-- PRESETS -->
<div>
  <button onclick="selectSession(60,10)">60 + 10</button>
  <button onclick="selectSession(50,5)">50 + 5</button>
  <button onclick="selectSession(90,10)">90 + 10</button>
</div>

<button class="play" onclick="startTimer()">▶ Start Exam Mode</button>

<!-- CUSTOM -->
<div class="input-grid">
  <div>
    <h3>Reading</h3>
    <input id="readInput" type="number" step="0.1">
  </div>

  <div>
    <h3>Writing</h3>
    <input id="writeInput" type="number" step="0.1">
  </div>
</div>

<button onclick="applyCustom()">Apply</button>

<br>

<button class="control" onclick="stopTimer()">Stop</button>
<button class="secondary" onclick="togglePause()">Pause (Space)</button>

<audio id="beep">
  <source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" type="audio/ogg">
</audio>

<script>
let timer = null;
let endTime = 0;
let paused = false;
let remaining = 0;

let phase = "reading";
let readingDuration = 0;
let writingDuration = 0;

let prevLeft = null;

function toSeconds(m) {
  return Math.round(parseFloat(m || 0) * 60);
}

function selectSession(w, r) {
  writingDuration = toSeconds(w);
  readingDuration = toSeconds(r);
  updateDisplay();
}

function applyCustom() {
  const w = document.getElementById("writeInput").value;
  const r = document.getElementById("readInput").value;

  if (!w || !r) return alert("Enter both times");

  selectSession(w, r);
}

function updateDisplay() {
  readingTime.textContent = format(readingDuration);
  writingTime.textContent = format(writingDuration);
  mainTimer.textContent = format(readingDuration);
}

function startTimer() {
  if (!readingDuration || !writingDuration) {
    alert("Select or apply times first");
    return;
  }

  enterExamMode();

  clearInterval(timer);
  phase = "reading";
  startPhase(readingDuration);
}

function enterExamMode() {
  document.documentElement.requestFullscreen?.();
  document.getElementById("overlay").style.display = "flex";
}

function startPhase(seconds) {
  endTime = Date.now() + seconds * 1000;
  prevLeft = null;
  timer = setInterval(update, 200);
}

function update() {
  if (paused) return;

  let left = Math.max(0, Math.floor((endTime - Date.now()) / 1000));

  // 🔊 5-minute warning (FIXED)
  if (prevLeft !== null && prevLeft > 300 && left <= 300) {
    beep();
  }

  document.getElementById("mainTimer").textContent = format(left);

  if (left <= 0) {
    beep();

    if (phase === "reading") {
      phase = "writing";
      startPhase(writingDuration);
    } else {
      clearInterval(timer);
      document.getElementById("overlay").textContent = "EXAM COMPLETE";
    }
  }

  prevLeft = left;
}

function togglePause() {
  if (!timer) return;

  if (!paused) {
    remaining = endTime - Date.now();
    paused = true;
  } else {
    paused = false;
    endTime = Date.now() + remaining;
  }
}

function stopTimer() {
  clearInterval(timer);
  document.getElementById("overlay").style.display = "none";
}

function format(s) {
  let m = Math.floor(s / 60);
  let sec = s % 60;
  return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}

function beep() {
  document.getElementById("beep").play();
}

// Spacebar
document.addEventListener("keydown", e => {
  if (e.code === "Space") {
    e.preventDefault();
    togglePause();
  }
});
</script>

</body>
</html>
