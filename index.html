<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Exam Timer</title>

<style>
  body {
    font-family: Arial, sans-serif;
    background: #111;
    color: #fff;
    text-align: center;
    margin: 0;
  }

  /* TOP BAR */
  #topbar {
    display: flex;
    justify-content: space-between;
    padding: 10px 20px;
    font-size: 14px;
    opacity: 0.9;
  }

  #lock {
    cursor: pointer;
    user-select: none;
  }

  /* TIMER */
  .timer {
    font-size: 70px;
    margin: 10px 0;
  }

  .container {
    display: flex;
    justify-content: center;
    gap: 40px;
    margin: 20px;
  }

  .box {
    border: 2px solid #fff;
    padding: 20px;
    width: 200px;
    border-radius: 10px;
  }

  .active {
    background: #2ecc71;
    color: #000;
  }

  button {
    margin: 6px;
    padding: 10px 16px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    background: #3498db;
    color: white;
  }

  .play { background: #2ecc71; color: black; }
  .control { background: #e74c3c; }

  input {
    padding: 8px;
    width: 110px;
    border-radius: 6px;
    border: none;
    text-align: center;
  }

  /* PROGRESS BAR */
  #barContainer {
    width: 80%;
    height: 10px;
    background: #333;
    margin: 10px auto;
    border-radius: 5px;
    overflow: hidden;
  }

  #bar {
    height: 100%;
    width: 100%;
    background: #2ecc71;
    transition: width 0.2s linear;
  }

  /* WARNING */
  .warn {
    color: red;
    font-size: 22px;
    animation: flash 0.8s infinite;
  }

  @keyframes flash {
    0% { opacity: 1; }
    50% { opacity: 0.2; }
    100% { opacity: 1; }
  }

  .input-grid {
    display: flex;
    justify-content: center;
    gap: 40px;
  }
</style>
</head>

<body>

<!-- TOP BAR -->
<div id="topbar">
  <div>👤 Eddie Singh</div>
  <div id="lock" onclick="toggleFullscreen()">🔒</div>
</div>

<h1>Exam Timer</h1>

<div class="container">
  <div id="readingBox" class="box">
    <h2>Reading</h2>
    <p id="readingTime">00:00</p>
  </div>

  <div id="writingBox" class="box">
    <h2>Writing</h2>
    <p id="writingTime">00:00</p>
  </div>
</div>

<div id="warn" class="warn"></div>

<div class="timer" id="mainTimer">00:00</div>

<!-- PROGRESS BAR -->
<div id="barContainer">
  <div id="bar"></div>
</div>

<!-- PRESETS -->
<div>
  <button onclick="selectSession(60,10)">60 + 10</button>
  <button onclick="selectSession(50,5)">50 + 5</button>
  <button onclick="selectSession(90,10)">90 + 10</button>
</div>

<button class="play" onclick="startTimer()">▶ Start</button>

<!-- CUSTOM -->
<div class="input-grid">
  <div>
    <h3>Reading</h3>
    <input id="readInput" type="number" step="0.1">
  </div>
  <div>
    <h3>Writing</h3>
    <input id="writeInput" type="number" step="0.1">
  </div>
</div>

<button onclick="applyCustom()">Apply</button>

<br>

<button class="control" onclick="stopTimer()">Stop</button>

<audio id="beep">
  <source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg">
</audio>

<script>
let timer, endTime, paused=false, remaining;
let phase="reading";
let readingDuration=0, writingDuration=0;
let prevLeft=null;

function toSec(m){return Math.round(parseFloat(m||0)*60);}

function selectSession(w,r){
  writingDuration=toSec(w);
  readingDuration=toSec(r);
  updateDisplay();
}

function applyCustom(){
  selectSession(writeInput.value, readInput.value);
}

function updateDisplay(){
  writingTime.textContent=format(writingDuration);
  readingTime.textContent=format(readingDuration);
  mainTimer.textContent=format(readingDuration);
}

function startTimer(){
  if(!readingDuration||!writingDuration)return;

  document.documentElement.requestFullscreen?.();

  phase="reading";
  startPhase(readingDuration);
}

function startPhase(sec){
  endTime=Date.now()+sec*1000;
  prevLeft=null;
  warnShown=false;
  document.getElementById("warn").textContent="";
  timer=setInterval(update,200);
}

let warnShown=false;

function update(){
  if(paused)return;

  let left=Math.max(0,Math.floor((endTime-Date.now())/1000));

  // 🔴 2-minute flashing warning
  if(left<=120){
    document.getElementById("warn").textContent="⚠ LAST 2 MINUTES";
  } else {
    document.getElementById("warn").textContent="";
  }

  // progress bar
  let total = phase==="reading"?readingDuration:writingDuration;
  let pct = (left/total)*100;
  bar.style.width = pct + "%";

  mainTimer.textContent=format(left);

  if(prevLeft!==null && prevLeft>300 && left<=300){
    beep();
  }

  if(left<=0){
    beep();

    if(phase==="reading"){
      phase="writing";
      startPhase(writingDuration);
    } else {
      clearInterval(timer);
      document.getElementById("warn").textContent="DONE";
    }
  }

  prevLeft=left;
}

function toggleFullscreen(){
  if(!document.fullscreenElement){
    document.documentElement.requestFullscreen();
  } else {
    document.exitFullscreen();
  }
}

function stopTimer(){
  clearInterval(timer);
}

function format(s){
  let m=Math.floor(s/60), sec=s%60;
  return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}

function beep(){
  document.getElementById("beep").play();
}
</script>

</body>
</html>
