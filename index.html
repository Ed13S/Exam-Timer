<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VCAA Style Exam Timer</title>
<style>
  body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #111;
    color: #fff;
    text-align: center;
    overflow-x: hidden;
    transition: background 0.3s;
  }

  #topbar {
    display: flex;
    justify-content: space-between;
    padding: 15px 30px;
    background: #1a1a1a;
    border-bottom: 1px solid #333;
    font-size: 14px;
    letter-spacing: 1px;
  }

  h1 { margin: 20px 0 10px; font-weight: 300; color: #aaa; }

  .timer-label {
    font-size: 1.2rem;
    color: #888;
    margin-bottom: -10px;
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  .timer {
    font-size: 110px;
    font-weight: 700;
    margin: 10px 0;
    font-family: monospace;
    color: #fff;
  }

  .container {
    display: flex;
    justify-content: center;
    gap: 40px;
    margin: 20px 0;
  }

  .box {
    border: 1px solid #333;
    padding: 15px;
    width: 180px;
    border-radius: 8px;
    background: #161616;
  }

  .reading-title { color: #2ecc71; border-bottom: 2px solid #2ecc71; }
  .writing-title { color: #3498db; border-bottom: 2px solid #3498db; }

  /* BAR SYSTEM */
  #barContainer {
    width: 85%;
    height: 30px;
    margin: 30px auto;
    background: #333; /* Grey = Spent Time */
    border-radius: 4px;
    position: relative;
    overflow: hidden;
    border: 1px solid #444;
  }

  #writingBar {
    position: absolute;
    height: 100%;
    background: #3498db;
    width: 100%;
    left: 0;
    z-index: 1;
    /* This will shrink Left -> Right via the 'left' property */
    transition: width 0.1s linear, left 0.1s linear;
  }

  #readingBar {
    position: absolute;
    height: 100%;
    background: #2ecc71;
    width: 100%;
    right: 0;
    z-index: 2;
    /* This will shrink Right -> Left via the 'width' property */
    transition: width 0.1s linear;
  }

  /* CONTROLS */
  .controls { margin-top: 30px; }
  
  button {
    margin: 5px;
    padding: 12px 25px;
    font-size: 15px;
    border-radius: 5px;
    border: none;
    cursor: pointer;
    font-weight: 600;
    transition: opacity 0.2s;
  }

  button:hover { opacity: 0.8; }
  .play { background: #2ecc71; color: #000; }
  .pause { background: #f1c40f; color: #000; }
  .stop { background: #e74c3c; color: #fff; }
  .alarm-btn { background: #ff4757; color: #fff; animation: pulse 1s infinite; }

  @keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.05); }
    100% { transform: scale(1); }
  }

  .input-group {
    display: inline-block;
    margin: 0 15px;
  }

  input {
    background: #222;
    border: 1px solid #444;
    color: #fff;
    padding: 10px;
    width: 70px;
    border-radius: 4px;
    text-align: center;
  }

  .flash { animation: flashBg 0.3s alternate infinite; }
  @keyframes flashBg {
    from { background: #111; }
    to { background: #600; }
  }
</style>
</head>
<body>

<div id="topbar">
  <div>Eddie Singh</div>
  <div id="clockDisplay"></div>
</div>

<h1>EXAM CONDITIONS</h1>

<div class="container">
  <div class="box">
    <h3 class="reading-title">Reading</h3>
    <div id="readDisplay">00:00</div>
  </div>
  <div class="box">
    <h3 class="writing-title">Writing</h3>
    <div id="writeDisplay">00:00</div>
  </div>
</div>

<div id="phaseLabel" class="timer-label">Ready</div>
<div class="timer" id="mainTimer">00:00</div>

<div id="barContainer">
  <div id="writingBar"></div>
  <div id="readingBar"></div>
</div>

<div class="controls">
  <button onclick="selectSession(10, 90)">10 + 90</button>
  <button onclick="selectSession(5, 50)">5 + 50</button>
  <button onclick="selectSession(15, 120)">15 + 120</button>
  <br><br>
  <div class="input-group">
    Reading: <input type="number" id="readIn" value="10">
  </div>
  <div class="input-group">
    Writing: <input type="number" id="writeIn" value="90">
  </div>
  <button onclick="applyCustom()">Set Custom</button>
  <br><br>
  <button id="mainBtn" class="play" onclick="handlePrimaryAction()">▶ START EXAM</button>
  <button class="stop" onclick="resetTimer()">RESET</button>
</div>

<script>
let readingTime = 0, writingTime = 0;
let timeLeft = 0;
let isReadingPhase = true;
let timerInterval = null;
let isPaused = false;
let isAlarming = false;

// Audio context for a beep if desired, but using visual flash as requested
const mainBtn = document.getElementById('mainBtn');
const mainTimer = document.getElementById('mainTimer');
const phaseLabel = document.getElementById('phaseLabel');
const rBar = document.getElementById('readingBar');
const wBar = document.getElementById('writingBar');

function updateClock() {
  const now = new Date();
  document.getElementById('clockDisplay').textContent = now.toLocaleTimeString();
}
setInterval(updateClock, 1000);
updateClock();

function format(s) {
  let mins = Math.floor(s / 60);
  let secs = s % 60;
  return `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
}

function selectSession(r, w) {
  resetTimer();
  readingTime = r * 60;
  writingTime = w * 60;
  document.getElementById('readDisplay').textContent = format(readingTime);
  document.getElementById('writeDisplay').textContent = format(writingTime);
  timeLeft = readingTime;
  mainTimer.textContent = format(timeLeft);
  phaseLabel.textContent = "Reading Phase";
  
  // Reset Bars
  rBar.style.width = "100%";
  wBar.style.left = "0";
  wBar.style.width = "100%";
}

function applyCustom() {
  let r = parseFloat(document.getElementById('readIn').value) || 0;
  let w = parseFloat(document.getElementById('writeIn').value) || 0;
  selectSession(r, w);
}

function handlePrimaryAction() {
  if (isAlarming) {
    stopAlarm();
    return;
  }
  if (!timerInterval && !isPaused) {
    startTimer();
  } else if (!isPaused) {
    pauseTimer();
  } else {
    resumeTimer();
  }
}

function startTimer() {
  if (timeLeft <= 0 && isReadingPhase) {
    // Transition to writing if reading was set to 0
    startWritingPhase();
    return;
  }
  isPaused = false;
  mainBtn.textContent = "⏸ PAUSE";
  mainBtn.className = "pause";
  timerInterval = setInterval(tick, 1000);
}

function pauseTimer() {
  isPaused = true;
  clearInterval(timerInterval);
  timerInterval = null;
  mainBtn.textContent = "▶ RESUME";
  mainBtn.className = "play";
}

function resumeTimer() {
  startTimer();
}

function tick() {
  if (timeLeft > 0) {
    timeLeft--;
    mainTimer.textContent = format(timeLeft);
    updateBars();
    
    // Warning Flashes (5, 2, 1 min)
    if ([300, 120, 60].includes(timeLeft)) {
      triggerBurst();
    }
  } else {
    if (isReadingPhase) {
      triggerPhaseEndAlarm();
    } else {
      triggerFinalAlarm();
    }
  }
}

function updateBars() {
  if (isReadingPhase) {
    // Shrink Green Right -> Left
    let pc = (timeLeft / readingTime) * 100;
    rBar.style.width = pc + "%";
  } else {
    // Shrink Blue Left -> Right
    // To do this: decrease width AND increase left offset
    let pc = (timeLeft / writingTime) * 100;
    let spentpc = 100 - pc;
    wBar.style.width = pc + "%";
    wBar.style.left = spentpc + "%";
  }
}

function triggerPhaseEndAlarm() {
  clearInterval(timerInterval);
  timerInterval = null;
  isAlarming = true;
  document.body.classList.add('flash');
  mainBtn.textContent = "🛑 START WRITING";
  mainBtn.className = "alarm-btn";
  phaseLabel.textContent = "Reading Time Over";
}

function startWritingPhase() {
  stopAlarm();
  isReadingPhase = false;
  timeLeft = writingTime;
  rBar.style.width = "0%"; // Remove green
  phaseLabel.textContent = "Writing Phase";
  startTimer();
}

function triggerFinalAlarm() {
  clearInterval(timerInterval);
  timerInterval = null;
  isAlarming = true;
  document.body.classList.add('flash');
  mainBtn.textContent = "🛑 STOP ALARM";
  mainBtn.className = "alarm-btn";
  phaseLabel.textContent = "Examination Finished";
}

function stopAlarm() {
  document.body.classList.remove('flash');
  isAlarming = false;
  if (isReadingPhase) {
    startWritingPhase();
  } else {
    resetTimer();
  }
}

function triggerBurst() {
  document.body.classList.add('flash');
  setTimeout(() => document.body.classList.remove('flash'), 1000);
}

function resetTimer() {
  clearInterval(timerInterval);
  timerInterval = null;
  isPaused = false;
  isReadingPhase = true;
  isAlarming = false;
  document.body.classList.remove('flash');
  mainBtn.textContent = "▶ START EXAM";
  mainBtn.className = "play";
  phaseLabel.textContent = "Ready";
  rBar.style.width = "100%";
  wBar.style.left = "0";
  wBar.style.width = "100%";
  applyCustom(); 
}

// Initialize
selectSession(10, 90);
</script>
</body>
</html>
