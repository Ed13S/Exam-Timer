<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Exam Timer</title>
<style>
  body {
    margin: 0;
    font-family: 'Segoe UI', Helvetica, Arial, sans-serif;
    background: #111;
    color: #fff;
    text-align: center;
    overflow: hidden;
    transition: background 0.3s;
  }

  #topbar {
    display: flex;
    justify-content: space-between;
    padding: 15px 30px;
    background: #1a1a1a;
    border-bottom: 1px solid #333;
    font-size: 14px;
  }

  h1 { margin: 20px 0 10px; font-weight: 500; color: #fff; letter-spacing: 1px; }

  .timer-label {
    font-size: 1.2rem;
    color: #888;
    margin-bottom: -5px;
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  .timer {
    font-size: 140px;
    font-weight: 700;
    margin: 0;
    font-family: monospace; /* Font style reverted as requested */
  }

  .container {
    display: flex;
    justify-content: center;
    gap: 40px;
    margin: 20px 0;
  }

  .box {
    border: 1px solid #333;
    padding: 20px;
    width: 220px;
    border-radius: 12px;
    background: #161616;
    transition: all 0.5s ease;
  }

  .box.active-phase {
    background: #e0e0e0;
    color: #000;
    border-color: #fff;
    box-shadow: 0 0 25px rgba(255,255,255,0.1);
  }

  /* Phase Underlines */
  .reading-title { 
    font-weight: bold; 
    display: inline-block; 
    margin-bottom: 8px; 
    font-size: 0.85rem;
    border-bottom: 3px solid #2ecc71;
    padding-bottom: 2px;
  }

  .writing-title { 
    font-weight: bold; 
    display: inline-block; 
    margin-bottom: 8px; 
    font-size: 0.85rem;
    border-bottom: 3px solid #3498db;
    padding-bottom: 2px;
  }

  /* BAR SYSTEM */
  #barContainer {
    width: 85%;
    height: 40px;
    margin: 25px auto;
    background: #333; /* Grey (Time Spent) */
    border-radius: 8px;
    position: relative;
    overflow: hidden;
    border: 2px solid #444;
  }

  #writingBar {
    position: absolute;
    height: 100%;
    background: #3498db;
    width: 100%;
    left: 0; /* Shrinks Left-to-Right */
    z-index: 1;
  }

  #readingBar {
    position: absolute;
    height: 100%;
    background: #2ecc71;
    width: 100%;
    right: 0; /* Shrinks Right-to-Left */
    z-index: 2;
  }

  button {
    margin: 5px;
    padding: 12px 25px;
    font-size: 15px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    font-weight: 600;
  }

  .play { background: #2ecc71; color: #000; }
  .pause { background: #f1c40f; color: #000; }
  .stop { background: #e74c3c; color: #fff; }
  .alarm-btn { background: #ff4757; color: #fff; animation: pulse 1s infinite; }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.03); }
  }

  input {
    background: #222;
    border: 1px solid #444;
    color: #fff;
    padding: 10px;
    width: 60px;
    border-radius: 4px;
    text-align: center;
  }

  .flash { animation: flashBg 0.4s alternate infinite; }
  @keyframes flashBg {
    from { background: #111; }
    to { background: #700; }
  }
</style>
</head>
<body>

<div id="topbar">
  <div>Eddie Singh</div>
  <div id="clockDisplay"></div>
</div>

<h1>Timer</h1>

<div class="container">
  <div id="readBox" class="box">
    <span class="reading-title">READING TIME</span>
    <div id="readDisplay" style="font-size: 1.8rem; font-weight: 600;">00:00</div>
  </div>
  <div id="writeBox" class="box">
    <span class="writing-title">WRITING TIME</span>
    <div id="writeDisplay" style="font-size: 1.8rem; font-weight: 600;">00:00</div>
  </div>
</div>

<div id="phaseLabel" class="timer-label">Ready</div>
<div class="timer" id="mainTimer">00:00</div>

<div id="barContainer">
  <div id="writingBar"></div>
  <div id="readingBar"></div>
</div>

<div class="controls">
  <button onclick="setSession(10, 90)">10 + 90</button>
  <button onclick="setSession(5, 50)">5 + 50</button>
  <button onclick="setSession(15, 120)">15 + 120</button>
  <br><br>
  Reading: <input type="number" id="readIn" value="10">
  Writing: <input type="number" id="writeIn" value="90">
  <button onclick="applyCustom()">Set Custom</button>
  <br><br>
  <button id="mainBtn" class="play" onclick="handlePrimaryAction()">▶ START EXAM</button>
  <button class="stop" onclick="fullReset()">RESET</button>
</div>

<script>
let rSec = 0, wSec = 0;
let phase = 'reading'; 
let timerLeft = 0;
let interval = null;
let alarming = false;

const mainBtn = document.getElementById('mainBtn');
const mainTimer = document.getElementById('mainTimer');
const phaseLabel = document.getElementById('phaseLabel');
const rBar = document.getElementById('readingBar');
const wBar = document.getElementById('writingBar');

function updateClock() {
  document.getElementById('clockDisplay').textContent = new Date().toLocaleTimeString();
}
setInterval(updateClock, 1000);
updateClock();

function format(s) {
  let m = Math.floor(s / 60);
  let sec = s % 60;
  return `${String(m).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
}

function setSession(r, w) {
  fullReset();
  rSec = r * 60;
  wSec = w * 60;
  
  document.getElementById('readDisplay').textContent = format(rSec);
  document.getElementById('writeDisplay').textContent = format(wSec);
  
  if (rSec > 0) {
    phase = 'reading';
    timerLeft = rSec;
  } else {
    phase = 'writing';
    timerLeft = wSec;
  }
  
  mainTimer.textContent = format(timerLeft);
  refreshUI();
}

function applyCustom() {
  const r = parseFloat(document.getElementById('readIn').value) || 0;
  const w = parseFloat(document.getElementById('writeIn').value) || 0;
  setSession(r, w);
}

function refreshUI() {
  if (phase === 'reading') {
    document.getElementById('readBox').classList.add('active-phase');
    document.getElementById('writeBox').classList.remove('active-phase');
    phaseLabel.textContent = "Reading Phase";
    rBar.style.display = "block";
  } else {
    document.getElementById('writeBox').classList.add('active-phase');
    document.getElementById('readBox').classList.remove('active-phase');
    phaseLabel.textContent = "Writing Phase";
    rBar.style.display = "none";
  }
}

function handlePrimaryAction() {
  if (alarming) {
    stopAlarm();
    return;
  }
  if (!interval) {
    if (document.documentElement.requestFullscreen) {
      document.documentElement.requestFullscreen().catch(() => {});
    }
    start();
  } else {
    pause();
  }
}

function start() {
  mainBtn.textContent = "⏸ PAUSE";
  mainBtn.className = "pause";
  interval = setInterval(tick, 1000);
}

function pause() {
  clearInterval(interval);
  interval = null;
  mainBtn.textContent = "▶ RESUME";
  mainBtn.className = "play";
}

function tick() {
  if (timerLeft > 0) {
    timerLeft--;
    mainTimer.textContent = format(timerLeft);
    
    if (phase === 'reading') {
      rBar.style.width = (timerLeft / rSec * 100) + "%";
      wBar.style.width = "100%";
    } else {
      wBar.style.width = (timerLeft / wSec * 100) + "%";
    }

    if ([300, 120, 60].includes(timerLeft)) {
      document.body.classList.add('flash');
      setTimeout(() => document.body.classList.remove('flash'), 1000);
    }
  } else {
    if (phase === 'reading' && wSec > 0) {
      phase = 'writing';
      timerLeft = wSec;
      refreshUI();
      mainTimer.textContent = format(timerLeft);
      document.body.classList.add('flash');
      setTimeout(() => document.body.classList.remove('flash'), 800);
    } else {
      finish();
    }
  }
}

function finish() {
  clearInterval(interval);
  interval = null;
  alarming = true;
  document.body.classList.add('flash');
  mainBtn.textContent = "🛑 STOP ALARM";
  mainBtn.className = "alarm-btn";
  phaseLabel.textContent = "Time Up";
}

function stopAlarm() {
  alarming = false;
  document.body.classList.remove('flash');
  fullReset();
}

function fullReset() {
  clearInterval(interval);
  interval = null;
  alarming = false;
  document.body.classList.remove('flash');
  mainBtn.textContent = "▶ START EXAM";
  mainBtn.className = "play";
  rBar.style.width = "100%";
  wBar.style.width = "100%";
  refreshUI();
}

setSession(10, 90);
</script>
</body>
</html>
