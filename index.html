<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Exam Timer</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #111;
    color: #fff;
    text-align: center;
  }

  #topbar {
    display: flex;
    justify-content: space-between;
    padding: 14px 24px;
    font-size: 14px;
  }

  #lock img {
    width: 20px;
    height: 20px;
    cursor: pointer;
  }

  .timer {
    font-size: 76px;
    margin: 10px 0;
  }

  #barContainer {
    width: 80%;
    height: 16px;
    margin: 20px auto;
    background: #222;
    border-radius: 8px;
    overflow: hidden;
  }

  #barFill {
    height: 100%;
    width: 100%;
  }

  button {
    margin: 8px;
    padding: 14px 22px;
    font-size: 16px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
  }

  .play { background: #2ecc71; }
  .stop { background: #e74c3c; }

  /* PRESET HIGHLIGHT */
  .preset.active {
    outline: 3px solid #fff;
    transform: scale(1.05);
  }

  .input-grid {
    display: flex;
    justify-content: center;
    gap: 100px;
    margin-top: 30px;
  }

  input {
    padding: 12px;
    width: 140px;
    text-align: center;
    border-radius: 8px;
    border: none;
    background: #222;
    color: white;
  }

</style>
</head>

<body>

<div id="topbar">
  <div>Eddie Singh</div>
  <div onclick="toggleFullscreen()">🔒</div>
</div>

<div class="timer" id="mainTimer">00:00</div>

<div id="barContainer">
  <div id="barFill"></div>
</div>

<!-- PRESETS -->
<div>
  <button class="preset" onclick="selectSession(this,50,5)">50 + 5</button>
  <button class="preset" onclick="selectSession(this,60,10)">60 + 10</button>
  <button class="preset" onclick="selectSession(this,90,10)">90 + 10</button>
</div>

<button class="play" id="mainBtn" onclick="startPause()">Start</button>
<button class="stop" onclick="stopTimer()">Stop</button>

<!-- CUSTOM -->
<div class="input-grid">
  <div>
    <h3>Reading</h3>
    <input id="readInput" type="number" step="0.1">
  </div>

  <div>
    <h3>Writing</h3>
    <input id="writeInput" type="number" step="0.1">
  </div>
</div>

<button onclick="applyCustom()">Apply Custom</button>

<script>

let timer;
let endTime;

let writingDuration = 0;
let readingDuration = 0;
let totalDuration = 0;

let running = false;
let paused = false;
let remaining = 0;

let selectedBtn = null;

function toSec(m){ return Math.round(parseFloat(m||0)*60); }

/* PRESETS */
function selectSession(btn, w, r){

  // highlight UI
  document.querySelectorAll(".preset").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  selectedBtn = btn;

  writingDuration = toSec(w);
  readingDuration = toSec(r);
  totalDuration = writingDuration + readingDuration;
}

/* CUSTOM */
function applyCustom(){
  document.querySelectorAll(".preset").forEach(b => b.classList.remove("active"));
  selectedBtn = null;

  writingDuration = toSec(writeInput.value);
  readingDuration = toSec(readInput.value);
  totalDuration = writingDuration + readingDuration;
}

/* START / PAUSE */
function startPause(){
  if(!running){
    startTimer();
    return;
  }

  if(!paused){
    paused = true;
    clearInterval(timer);
    remaining = endTime - Date.now();
    mainBtn.textContent = "Resume";
  } else {
    paused = false;
    endTime = Date.now() + remaining;
    timer = setInterval(update, 100);
    mainBtn.textContent = "Pause";
  }
}

function startTimer(){
  if(!totalDuration) return;

  running = true;
  paused = false;

  endTime = Date.now() + totalDuration * 1000;

  timer = setInterval(update, 100);

  mainBtn.textContent = "Pause";
}

function stopTimer(){
  clearInterval(timer);
  running = false;
  paused = false;
  mainTimer.textContent = "00:00";
  mainBtn.textContent = "Start";
}

/* UPDATE */
function update(){
  let left = Math.max(0, Math.floor((endTime - Date.now()) / 1000));
  mainTimer.textContent = format(left);

  let elapsed = totalDuration - left;
  let progress = elapsed / totalDuration;
  let readingEnd = readingDuration / totalDuration;

  // 🟢 reading phase
  if(progress <= readingEnd){

    let p = progress / readingEnd;

    barFill.style.background = `
      linear-gradient(to left,
      #3498db 0%,
      #3498db ${p*100}%,
      #2ecc71 ${p*100}%,
      #2ecc71 100%)
    `;

  } 
  // 🔵 writing phase
  else {

    let p = (progress - readingEnd) / (1 - readingEnd);

    barFill.style.background = `
      linear-gradient(to right,
      #444 0%,
      #444 ${p*100}%,
      #3498db ${p*100}%,
      #3498db 100%)
    `;
  }

  barFill.style.width = "100%";

  if(left <= 0){
    clearInterval(timer);
    mainBtn.textContent = "Done";
  }
}

/* FORMAT */
function format(s){
  let m = Math.floor(s/60);
  let sec = s%60;
  return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}

/* FULLSCREEN */
function toggleFullscreen(){
  if(!document.fullscreenElement){
    document.documentElement.requestFullscreen();
  } else {
    document.exitFullscreen();
  }
}

/* SPACEBAR */
document.addEventListener("keydown", e=>{
  if(e.code === "Space"){
    e.preventDefault();
    startPause();
  }
});

</script>

</body>
</html>
