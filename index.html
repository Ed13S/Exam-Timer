<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Exam Timer</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #111;
      color: #fff;
    }

    .container {
      display: flex;
      justify-content: center;
      gap: 40px;
      margin: 20px;
    }

    .box {
      border: 2px solid #fff;
      padding: 20px;
      width: 200px;
      border-radius: 10px;
    }

    .active {
      background-color: #2ecc71;
      color: #000;
    }

    .timer {
      font-size: 60px;
      margin: 20px 0;
    }

    button {
      margin: 8px;
      padding: 12px 18px;
      font-size: 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: #3498db;
      color: white;
    }

    .control { background: #e74c3c; }
    .secondary { background: #555; }

    /* ✅ INPUTS FIXED HERE */
    .inputs {
      margin-top: 20px;
    }

    input {
      padding: 10px;
      margin: 5px;
      width: 100px;
      font-size: 16px;
      text-align: center;
      border-radius: 6px;
      border: none;
    }
  </style>
</head>
<body>

  <h1>Exam Timer</h1>

  <div class="container">
    <div id="readingBox" class="box">
      <h2>Reading</h2>
      <p id="readingTime">00:00</p>
    </div>

    <div id="writingBox" class="box">
      <h2>Writing</h2>
      <p id="writingTime">00:00</p>
    </div>
  </div>

  <div class="timer" id="mainTimer">00:00</div>

  <!-- PRESETS -->
  <div>
    <button onclick="startSession(60,10)">60 + 10</button>
    <button onclick="startSession(50,5)">50 + 5</button>
    <button onclick="startSession(90,10)">90 + 10</button>
  </div>

  <!-- ✅ INPUT BOXES (VISIBLE) -->
  <div class="inputs">
    <h3>Custom Time</h3>
    <div>
      Writing (min):
      <input id="writeInput" type="number" min="1" placeholder="e.g. 60">
    </div>
    <div>
      Reading (min):
      <input id="readInput" type="number" min="1" placeholder="e.g. 10">
    </div>
    <button onclick="startCustom()">Start Custom</button>
  </div>

  <!-- CONTROLS -->
  <div>
    <button class="control" onclick="stopTimer()">Stop</button>
    <button class="secondary" onclick="togglePause()">Pause (Space)</button>
  </div>

  <audio id="beep">
    <source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" type="audio/ogg">
  </audio>

  <script>
    let timer = null;
    let endTime = 0;
    let paused = false;
    let remaining = 0;

    let phase = "reading";
    let readingDuration = 0;
    let writingDuration = 0;
    let warned = false;

    function startSession(writeMin, readMin) {
      clearInterval(timer);

      writingDuration = writeMin * 60;
      readingDuration = readMin * 60;

      document.getElementById("writingTime").textContent = format(writingDuration);
      document.getElementById("readingTime").textContent = format(readingDuration);

      phase = "reading";
      startPhase(readingDuration);
    }

    function startCustom() {
      const w = parseInt(document.getElementById("writeInput").value);
      const r = parseInt(document.getElementById("readInput").value);

      if (!w || !r || w <= 0 || r <= 0) {
        alert("Enter valid times");
        return;
      }

      startSession(w, r);
    }

    function startPhase(seconds) {
      warned = false;
      paused = false;
      endTime = Date.now() + seconds * 1000;

      updateUI();

      timer = setInterval(update, 200);
    }

    function update() {
      if (paused) return;

      let left = Math.max(0, Math.floor((endTime - Date.now()) / 1000));

      if (left === 300 && !warned) {
        beep();
        warned = true;
      }

      document.getElementById("mainTimer").textContent = format(left);

      if (left <= 0) {
        if (phase === "reading") {
          phase = "writing";
          startPhase(writingDuration);
        } else {
          clearInterval(timer);
          beep();
          alert("Done");
        }
      }
    }

    function togglePause() {
      if (!timer) return;

      if (!paused) {
        remaining = endTime - Date.now();
        paused = true;
      } else {
        paused = false;
        endTime = Date.now() + remaining;
      }
    }

    function stopTimer() {
      clearInterval(timer);
    }

    function updateUI() {
      readingBox.classList.remove("active");
      writingBox.classList.remove("active");

      if (phase === "reading") {
        readingBox.classList.add("active");
      } else {
        writingBox.classList.add("active");
      }
    }

    function format(s) {
      let m = Math.floor(s / 60);
      let sec = s % 60;
      return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
    }

    function beep() {
      document.getElementById("beep").play();
    }

    document.addEventListener("keydown", e => {
      if (e.code === "Space") {
        e.preventDefault();
        togglePause();
      }
    });
  </script>

</body>
</html>
