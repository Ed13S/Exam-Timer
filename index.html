<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Exam Timer</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #111;
    color: #fff;
    text-align: center;
  }

  #topbar {
    display: flex;
    justify-content: space-between;
    padding: 14px 24px;
    font-size: 14px;
  }

  #lock img {
    width: 20px;
    height: 20px;
    cursor: pointer;
  }

  h1 { margin: 10px 0; }

  .timer {
    font-size: 76px;
    margin: 10px 0 20px;
  }

  .container {
    display: flex;
    justify-content: center;
    gap: 80px;
    margin: 25px 0;
  }

  .box {
    border: 2px solid #333;
    padding: 25px;
    width: 240px;
    border-radius: 12px;
    background: #161616;
  }

  .reading-title {
    border-bottom: 3px solid #2ecc71;
    padding-bottom: 3px;
  }

  .writing-title {
    border-bottom: 3px solid #3498db;
    padding-bottom: 3px;
  }

  #barContainer {
    width: 80%;
    height: 16px;
    margin: 20px auto;
    background: #222;
    border-radius: 8px;
    overflow: hidden;
    display: flex;
  }

  #readingBar {
    background: #2ecc71;
    height: 100%;
    transition: width 0.2s linear;
  }

  #writingBar {
    background: #3498db;
    height: 100%;
    transition: width 0.2s linear;
  }

  button {
    margin: 8px;
    padding: 14px 22px;
    font-size: 16px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
  }

  .play { background: #2ecc71; color: black; }
  .stop { background: #e74c3c; color: white; }

  .input-grid {
    display: flex;
    justify-content: center;
    gap: 140px;
    margin-top: 40px;
  }

  input {
    padding: 14px;
    width: 140px;
    font-size: 16px;
    border-radius: 8px;
    border: none;
    text-align: center;
    background: #222;
    color: white;
  }

  .flash {
    animation: flash 0.25s alternate 2;
  }

  @keyframes flash {
    0% { background: #111; }
    100% { background: #8b0000; }
  }
</style>
</head>

<body>

<div id="topbar">
  <div>Eddie Singh</div>
  <div id="lock" onclick="toggleFullscreen()">
    <img src="https://p7.hiclipart.com/preview/23/137/277/padlock-computer-icons-door-padlock.jpg">
  </div>
</div>

<h1>Exam Timer</h1>

<div class="container">
  <div class="box">
    <h2><span class="reading-title">Reading</span></h2>
    <p id="readingTime">00:00</p>
  </div>

  <div class="box">
    <h2><span class="writing-title">Writing</span></h2>
    <p id="writingTime">00:00</p>
  </div>
</div>

<div class="timer" id="mainTimer">00:00</div>

<div id="barContainer">
  <div id="readingBar"></div>
  <div id="writingBar"></div>
</div>

<!-- PRESSETS (FIXED ORDER) -->
<div>
  <button onclick="selectSession(50,5)">50 + 5</button>
  <button onclick="selectSession(60,10)">60 + 10</button>
  <button onclick="selectSession(90,10)">90 + 10</button>
</div>

<button class="play" id="mainBtn" onclick="startPauseButton()">▶ Start</button>
<button class="stop" onclick="stopTimer()">Stop</button>

<div class="input-grid">
  <div>
    <h3>Reading (min)</h3>
    <input id="readInput" type="number" step="0.1">
  </div>

  <div>
    <h3>Writing (min)</h3>
    <input id="writeInput" type="number" step="0.1">
  </div>
</div>

<button onclick="applyCustom()">Apply</button>

<script>

let timer, endTime;
let readingDuration=0, writingDuration=0, totalDuration=0;

let running=false;
let paused=false;
let remaining=0;

let phase="reading";

// flash system
let fiveDone=false;
let twoDone=false;
let oneDone=false;
let readingEndDone=false;
let flashLoop=null;

function toSec(m){return Math.round(parseFloat(m||0)*60);}

/* FIXED: writing first, reading second */
function selectSession(w, r){
  writingDuration = toSec(w);
  readingDuration = toSec(r);
  totalDuration = readingDuration + writingDuration;

  readingTime.textContent = format(readingDuration);
  writingTime.textContent = format(writingDuration);

  setupBar();
}

function applyCustom(){
  selectSession(writeInput.value, readInput.value);
}

/* BAR */
function setupBar(){
  readingBar.style.width=(readingDuration/totalDuration)*100+"%";
  writingBar.style.width=(writingDuration/totalDuration)*100+"%";
}

/* BUTTON */
function startPauseButton(){
  if(!running){
    startTimer();
    return;
  }
  if(!paused){
    pauseTimer();
    mainBtn.textContent="▶ Resume";
  } else {
    resumeTimer();
    mainBtn.textContent="⏸ Pause";
  }
}

function startTimer(){
  if(!readingDuration||!writingDuration)return;

  document.documentElement.requestFullscreen?.();

  running=true;
  paused=false;
  phase="reading";

  endTime=Date.now()+readingDuration*1000;

  resetFlags();

  mainBtn.textContent="⏸ Pause";

  timer=setInterval(update,200);
}

function pauseTimer(){
  paused=true;
  clearInterval(timer);
  remaining=endTime-Date.now();
}

function resumeTimer(){
  paused=false;
  endTime=Date.now()+remaining;
  timer=setInterval(update,200);
}

function stopTimer(){
  running=false;
  paused=false;

  clearInterval(timer);
  stopFlash();

  mainBtn.textContent="▶ Start";
  mainTimer.textContent="00:00";
}

function resetFlags(){
  fiveDone=false;
  twoDone=false;
  oneDone=false;
  readingEndDone=false;
}

/* UPDATE */
function update(){
  let left=Math.max(0,Math.floor((endTime-Date.now())/1000));
  mainTimer.textContent=format(left);

  if(phase==="reading"){

    readingBar.style.width=(left/readingDuration)*100+"%";

    if(left<=0){
      phase="writing";
      endTime=Date.now()+writingDuration*1000;

      burstFlash(3); // reading ends
    }

  } else {

    writingBar.style.width=(left/writingDuration)*100+"%";

    if(left<=0){
      startContinuousFlash();
      clearInterval(timer);
      mainBtn.textContent="⛔ Stop";
    }
  }

  /* WARNINGS */
  if(!fiveDone && left<=300 && left>120){
    fiveDone=true;
    burstFlash(5);
  }

  if(!twoDone && left<=120 && left>60){
    twoDone=true;
    burstFlash(2);
  }

  if(!oneDone && left<=60 && left>0){
    oneDone=true;
    burstFlash(1);
  }
}

/* FLASH */
function flashOnce(){
  document.body.classList.remove("flash");
  void document.body.offsetWidth;
  document.body.classList.add("flash");
}

function burstFlash(n){
  let i=0;
  let t=setInterval(()=>{
    flashOnce();
    i++;
    if(i>=n) clearInterval(t);
  },300);
}

function startContinuousFlash(){
  if(flashLoop) return;
  flashLoop=setInterval(flashOnce,400);
}

function stopFlash(){
  clearInterval(flashLoop);
  flashLoop=null;
}

/* FULLSCREEN */
function toggleFullscreen(){
  if(!document.fullscreenElement){
    document.documentElement.requestFullscreen();
  } else {
    document.exitFullscreen();
  }
}

/* FORMAT */
function format(s){
  let m=Math.floor(s/60), sec=s%60;
  return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}

</script>

</body>
</html>
