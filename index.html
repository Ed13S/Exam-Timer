<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VCE Exam Timer</title>
<style>
  body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #111;
    color: #fff;
    text-align: center;
    overflow: hidden;
    transition: background 0.3s;
  }

  #topbar {
    display: flex;
    justify-content: space-between;
    padding: 15px 30px;
    background: #1a1a1a;
    border-bottom: 1px solid #333;
    font-size: 14px;
  }

  h1 { margin: 20px 0 10px; font-weight: 400; color: #fff; }

  .timer-label {
    font-size: 1.2rem;
    color: #888;
    margin-bottom: -5px;
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  .timer {
    font-size: 120px;
    font-weight: 700;
    margin: 5px 0;
    font-family: monospace;
  }

  .container {
    display: flex;
    justify-content: center;
    gap: 40px;
    margin: 20px 0;
  }

  .box {
    border: 1px solid #333;
    padding: 20px;
    width: 200px;
    border-radius: 12px;
    background: #161616;
    color: #fff;
    transition: all 0.4s ease;
  }

  /* Active Phase Styling */
  .box.active-phase {
    background: #e0e0e0; /* Darker white */
    color: #000;
    border-color: #fff;
    box-shadow: 0 0 15px rgba(255,255,255,0.2);
  }

  .reading-title { font-weight: bold; display: block; margin-bottom: 5px; }
  .writing-title { font-weight: bold; display: block; margin-bottom: 5px; }

  #barContainer {
    width: 85%;
    height: 35px;
    margin: 25px auto;
    background: #333;
    border-radius: 6px;
    position: relative;
    overflow: hidden;
    border: 1px solid #444;
  }

  #writingBar {
    position: absolute;
    height: 100%;
    background: #3498db;
    width: 100%;
    left: 0;
    z-index: 1;
  }

  #readingBar {
    position: absolute;
    height: 100%;
    background: #2ecc71;
    width: 100%;
    right: 0;
    z-index: 2;
  }

  button {
    margin: 5px;
    padding: 12px 25px;
    font-size: 15px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    font-weight: 600;
  }

  .play { background: #2ecc71; color: #000; }
  .pause { background: #f1c40f; color: #000; }
  .stop { background: #e74c3c; color: #fff; }
  .alarm-btn { background: #ff4757; color: #fff; animation: pulse 1s infinite; }

  @keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.05); }
    100% { transform: scale(1); }
  }

  input {
    background: #222;
    border: 1px solid #444;
    color: #fff;
    padding: 10px;
    width: 60px;
    border-radius: 4px;
    text-align: center;
  }

  .flash { animation: flashBg 0.3s alternate infinite; }
  @keyframes flashBg {
    from { background: #111; }
    to { background: #800; }
  }
</style>
</head>
<body>

<div id="topbar">
  <div>Eddie Singh</div>
  <div id="clockDisplay"></div>
</div>

<h1>Timer</h1>

<div class="container">
  <div id="readBox" class="box">
    <span class="reading-title">READING</span>
    <div id="readDisplay" style="font-size: 1.5rem;">00:00</div>
  </div>
  <div id="writeBox" class="box">
    <span class="writing-title">WRITING</span>
    <div id="writeDisplay" style="font-size: 1.5rem;">00:00</div>
  </div>
</div>

<div id="phaseLabel" class="timer-label">Ready</div>
<div class="timer" id="mainTimer">00:00</div>

<div id="barContainer">
  <div id="writingBar"></div>
  <div id="readingBar"></div>
</div>

<div class="controls">
  <button onclick="setSession(10, 90)">10 + 90</button>
  <button onclick="setSession(5, 50)">5 + 50</button>
  <button onclick="setSession(15, 120)">15 + 120</button>
  <br><br>
  Reading: <input type="number" id="readIn" value="10">
  Writing: <input type="number" id="writeIn" value="90">
  <button onclick="applyCustom()">Set Custom</button>
  <br><br>
  <button id="mainBtn" class="play" onclick="handlePrimaryAction()">▶ START EXAM</button>
  <button class="stop" onclick="resetTimer()">RESET</button>
</div>

<script>
let readingSeconds = 0, writingSeconds = 0;
let timeLeft = 0;
let isReadingPhase = true;
let timerInterval = null;
let isPaused = false;
let isAlarming = false;

const mainBtn = document.getElementById('mainBtn');
const mainTimer = document.getElementById('mainTimer');
const phaseLabel = document.getElementById('phaseLabel');
const rBar = document.getElementById('readingBar');
const wBar = document.getElementById('writingBar');
const readBox = document.getElementById('readBox');
const writeBox = document.getElementById('writeBox');

function updateClock() {
  document.getElementById('clockDisplay').textContent = new Date().toLocaleTimeString();
}
setInterval(updateClock, 1000);
updateClock();

function format(s) {
  let mins = Math.floor(s / 60);
  let secs = s % 60;
  return `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
}

function setSession(r, w) {
  clearInterval(timerInterval);
  timerInterval = null;
  isReadingPhase = true;
  isAlarming = false;
  isPaused = false;
  document.body.classList.remove('flash');

  readingSeconds = r * 60;
  writingSeconds = w * 60;
  
  document.getElementById('readDisplay').textContent = format(readingSeconds);
  document.getElementById('writeDisplay').textContent = format(writingSeconds);
  
  timeLeft = readingSeconds > 0 ? readingSeconds : writingSeconds;
  if (readingSeconds <= 0) isReadingPhase = false;

  mainTimer.textContent = format(timeLeft);
  updateDisplayHighlight();
  
  rBar.style.width = "100%";
  wBar.style.left = "0";
  wBar.style.width = "100%";
  mainBtn.textContent = "▶ START EXAM";
  mainBtn.className = "play";
}

function applyCustom() {
  let r = parseFloat(document.getElementById('readIn').value) || 0;
  let w = parseFloat(document.getElementById('writeIn').value) || 0;
  setSession(r, w);
}

function updateDisplayHighlight() {
  if (isReadingPhase) {
    readBox.classList.add('active-phase');
    writeBox.classList.remove('active-phase');
    phaseLabel.textContent = "Reading Phase";
  } else {
    writeBox.classList.add('active-phase');
    readBox.classList.remove('active-phase');
    phaseLabel.textContent = "Writing Phase";
  }
}

function handlePrimaryAction() {
  if (isAlarming) {
    stopAlarm();
    return;
  }
  
  // Enter Fullscreen on first start
  if (!timerInterval && !isPaused) {
    if (document.documentElement.requestFullscreen) {
      document.documentElement.requestFullscreen().catch(() => {});
    }
    startTimer();
  } else if (!isPaused) {
    pauseTimer();
  } else {
    resumeTimer();
  }
}

function startTimer() {
  isPaused = false;
  mainBtn.textContent = "⏸ PAUSE";
  mainBtn.className = "pause";
  updateDisplayHighlight();
  timerInterval = setInterval(tick, 1000);
}

function pauseTimer() {
  isPaused = true;
  clearInterval(timerInterval);
  timerInterval = null;
  mainBtn.textContent = "▶ RESUME";
  mainBtn.className = "play";
}

function resumeTimer() {
  startTimer();
}

function tick() {
  if (timeLeft > 0) {
    timeLeft--;
    mainTimer.textContent = format(timeLeft);
    updateBars();
    if ([300, 120, 60].includes(timeLeft)) triggerFlashBurst();
  } else {
    if (isReadingPhase && writingSeconds > 0) {
      triggerPhaseAlarm();
    } else {
      triggerFinalAlarm();
    }
  }
}

function updateBars() {
  if (isReadingPhase) {
    let pc = (timeLeft / readingSeconds) * 100;
    rBar.style.width = pc + "%";
  } else {
    let pc = (timeLeft / writingSeconds) * 100;
    let spent = 100 - pc;
    wBar.style.width = pc + "%";
    wBar.style.left = spent + "%";
  }
}

function triggerPhaseAlarm() {
  clearInterval(timerInterval);
  timerInterval = null;
  isAlarming = true;
  document.body.classList.add('flash');
  mainBtn.textContent = "🛑 START WRITING";
  mainBtn.className = "alarm-btn";
  phaseLabel.textContent = "Reading Finished";
}

function triggerFinalAlarm() {
  clearInterval(timerInterval);
  timerInterval = null;
  isAlarming = true;
  document.body.classList.add('flash');
  mainBtn.textContent = "🛑 STOP TIMER";
  mainBtn.className = "alarm-btn";
  phaseLabel.textContent = "All Time Finished";
}

function stopAlarm() {
  document.body.classList.remove('flash');
  isAlarming = false;
  if (isReadingPhase) {
    isReadingPhase = false;
    timeLeft = writingSeconds;
    rBar.style.width = "0%";
    startTimer();
  } else {
    resetTimer();
  }
}

function triggerFlashBurst() {
  document.body.classList.add('flash');
  setTimeout(() => { if(!isAlarming) document.body.classList.remove('flash'); }, 1000);
}

function resetTimer() {
  applyCustom();
}

// Default Init
setSession(10, 90);
</script>
</body>
</html>
