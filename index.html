<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Exam Timer</title>

<style>
  body {
    font-family: Arial, sans-serif;
    background: #111;
    color: #fff;
    margin: 0;
    text-align: center;
  }

  /* TOP BAR */
  #topbar {
    display: flex;
    justify-content: space-between;
    padding: 14px 24px;
    font-size: 14px;
    opacity: 0.9;
  }

  #lock img {
    width: 20px;
    height: 20px;
    cursor: pointer;
  }

  h1 { margin: 10px 0; }

  /* TIMER */
  .timer {
    font-size: 75px;
    margin: 10px 0;
  }

  /* BOXES */
  .container {
    display: flex;
    justify-content: center;
    gap: 80px;
    margin: 25px 0;
  }

  .box {
    border: 2px solid #333;
    padding: 25px;
    width: 240px;
    border-radius: 12px;
    background: #161616;
  }

  .active-reading { background: #1e3a2a; border-color: #2ecc71; }
  .active-writing { background: #1a2b3a; border-color: #3498db; }

  /* UNDERLINES */
  .reading-title {
    display: inline-block;
    border-bottom: 3px solid #2ecc71;
    padding-bottom: 3px;
  }

  .writing-title {
    display: inline-block;
    border-bottom: 3px solid #3498db;
    padding-bottom: 3px;
  }

  /* SPLIT BAR */
  #barContainer {
    width: 75%;
    height: 14px;
    margin: 20px auto;
    background: #222;
    border-radius: 8px;
    overflow: hidden;
    display: flex;
  }

  #readingBar {
    background: #2ecc71;
    height: 100%;
    width: 50%;
    transition: width 0.2s linear;
  }

  #writingBar {
    background: #3498db;
    height: 100%;
    width: 50%;
    transition: width 0.2s linear;
  }

  /* BUTTONS */
  button {
    margin: 8px;
    padding: 14px 20px;
    font-size: 16px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    background: #3498db;
    color: white;
    min-width: 120px;
  }

  .play { background: #2ecc71; color: black; }

  /* INPUT LAYOUT */
  .input-grid {
    display: flex;
    justify-content: center;
    gap: 140px;
    margin-top: 40px;
  }

  .input-box h3 {
    margin: 0 0 8px;
    font-size: 15px;
  }

  input {
    padding: 14px;
    width: 140px;
    font-size: 16px;
    text-align: center;
    border-radius: 8px;
    border: none;
    background: #222;
    color: white;
  }

  .apply-btn {
    margin-top: 25px;
    padding: 12px 22px;
    background: #555;
    color: white;
    border: none;
    border-radius: 8px;
  }

  /* WARNING */
  #warn {
    font-size: 22px;
    color: red;
    height: 30px;
    animation: flash 0.8s infinite;
  }

  @keyframes flash {
    0% {opacity: 1;}
    50% {opacity: 0.2;}
    100% {opacity: 1;}
  }
</style>
</head>

<body>

<!-- TOP -->
<div id="topbar">
  <div>👤 Eddie Singh</div>
  <div id="lock" onclick="toggleFullscreen()">
    <img src="https://p7.hiclipart.com/preview/23/137/277/padlock-computer-icons-door-padlock.jpg">
  </div>
</div>

<h1>Exam Timer</h1>

<div class="container">
  <div id="readingBox" class="box">
    <h2><span class="reading-title">Reading</span></h2>
    <p id="readingTime">00:00</p>
  </div>

  <div id="writingBox" class="box">
    <h2><span class="writing-title">Writing</span></h2>
    <p id="writingTime">00:00</p>
  </div>
</div>

<div id="warn"></div>

<div class="timer" id="mainTimer">00:00</div>

<!-- SPLIT BAR -->
<div id="barContainer">
  <div id="readingBar"></div>
  <div id="writingBar"></div>
</div>

<!-- PRESETS -->
<div>
  <button onclick="selectSession(60,10)">60 + 10</button>
  <button onclick="selectSession(50,5)">50 + 5</button>
  <button onclick="selectSession(90,10)">90 + 10</button>
</div>

<button class="play" onclick="startTimer()">▶ Start</button>

<!-- INPUTS -->
<div class="input-grid">
  <div class="input-box">
    <h3>Reading (min)</h3>
    <input id="readInput" type="number" step="0.1">
  </div>

  <div class="input-box">
    <h3>Writing (min)</h3>
    <input id="writeInput" type="number" step="0.1">
  </div>
</div>

<button class="apply-btn" onclick="applyCustom()">Apply</button>

<script>
let timer, endTime;
let phase="reading";
let readingDuration=0, writingDuration=0;
let prevLeft=null;

function toSec(m){return Math.round(parseFloat(m||0)*60);}

function selectSession(w,r){
  writingDuration=toSec(w);
  readingDuration=toSec(r);
  updateDisplay();
  setupBar();
}

function applyCustom(){
  selectSession(writeInput.value, readInput.value);
}

function updateDisplay(){
  writingTime.textContent=format(writingDuration);
  readingTime.textContent=format(readingDuration);
  mainTimer.textContent=format(readingDuration);
}

function setupBar(){
  readingBar.style.width="50%";
  writingBar.style.width="50%";
}

function startTimer(){
  if(!readingDuration||!writingDuration)return;

  document.documentElement.requestFullscreen?.();

  phase="reading";
  startPhase(readingDuration);
}

function startPhase(sec){
  endTime=Date.now()+sec*1000;
  prevLeft=null;
  timer=setInterval(update,200);
}

function update(){
  let left=Math.max(0,Math.floor((endTime-Date.now())/1000));

  mainTimer.textContent=format(left);

  let total = phase==="reading"?readingDuration:writingDuration;
  let ratio = left/total;

  if(phase==="reading"){
    readingBar.style.width = (ratio*100) + "%";
    writingBar.style.width = "50%";
  } else {
    writingBar.style.width = (ratio*100) + "%";
    readingBar.style.width = "0%";
  }

  if(left<=0){
    if(phase==="reading"){
      phase="writing";
      startPhase(writingDuration);
    } else {
      clearInterval(timer);
      warn.textContent="DONE";
    }
  }
}

function toggleFullscreen(){
  if(!document.fullscreenElement){
    document.documentElement.requestFullscreen();
  } else {
    document.exitFullscreen();
  }
}

function format(s){
  let m=Math.floor(s/60), sec=s%60;
  return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}
</script>

</body>
</html>
