<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Exam Timer</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f0f0f;
  color: white;
  overflow: hidden;
}

/* ================= FLOATING WIDGET ================= */
#widget {
  position: fixed;
  top: 80px;
  left: 80px;
  width: 320px;
  background: #151515;
  border: 1px solid #333;
  border-radius: 14px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.6);
  user-select: none;
  z-index: 9999;
}

/* drag header */
#header {
  background: #1c1c1c;
  padding: 10px;
  cursor: grab;
  display: flex;
  justify-content: space-between;
  font-size: 13px;
  border-top-left-radius: 14px;
  border-top-right-radius: 14px;
}

#header:active { cursor: grabbing; }

/* timer */
#time {
  font-size: 42px;
  text-align: center;
  margin: 10px 0;
}

/* BAR */
#barContainer {
  height: 10px;
  background: #222;
  margin: 10px;
  border-radius: 6px;
  overflow: hidden;
  position: relative;
}

#greyBar {
  position: absolute;
  height: 100%;
  left: 0;
  background: #444;
  width: 0%;
}

#readingBar {
  position: absolute;
  height: 100%;
  left: 0;
  background: #2ecc71;
  width: 100%;
  transform-origin: right;
}

#writingBar {
  position: absolute;
  height: 100%;
  right: 0;
  background: #3498db;
  width: 0%;
  transform-origin: left;
}

/* buttons */
.controls {
  display: flex;
  justify-content: center;
  gap: 8px;
  padding: 10px;
}

button {
  border: none;
  padding: 8px 10px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 12px;
}

.start { background: #2ecc71; }
.stop { background: #e74c3c; color: white; }

/* flash */
.flash {
  animation: flash 0.25s alternate 2;
}

@keyframes flash {
  0% { background: #151515; }
  100% { background: #8b0000; }
}

</style>
</head>

<body>

<div id="widget">

  <div id="header">
    <div>Exam Timer</div>
    <div onclick="toggleFullscreen()">⛶</div>
  </div>

  <div id="time">00:00</div>

  <div id="barContainer">
    <div id="greyBar"></div>
    <div id="readingBar"></div>
    <div id="writingBar"></div>
  </div>

  <div class="controls">
    <button class="start" onclick="startTimer()">Start</button>
    <button class="stop" onclick="stopTimer()">Stop</button>
  </div>

</div>

<script>

/* ================= AUDIO ================= */
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function beep(duration = 0.15, freq = 880){
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();

  o.connect(g);
  g.connect(audioCtx.destination);

  o.frequency.value = freq;
  g.gain.value = 0.2;

  o.start();
  setTimeout(() => o.stop(), duration * 1000);
}

/* ================= DRAG ================= */
const widget = document.getElementById("widget");
const header = document.getElementById("header");

let offsetX, offsetY, dragging = false;

header.addEventListener("mousedown", (e)=>{
  dragging = true;
  offsetX = e.clientX - widget.offsetLeft;
  offsetY = e.clientY - widget.offsetTop;
});

document.addEventListener("mousemove", (e)=>{
  if(dragging){
    widget.style.left = (e.clientX - offsetX) + "px";
    widget.style.top = (e.clientY - offsetY) + "px";
  }
});

document.addEventListener("mouseup", ()=> dragging = false);

/* ================= TIMER ================= */
let timer;
let totalDuration = 100 * 60; // default demo
let readingDuration = 90 * 60;
let writingDuration = 10 * 60;

let endTime;
let running = false;

let fiveDone=false, twoDone=false, oneDone=false;

function startTimer(){
  if(running) return;

  document.documentElement.requestFullscreen?.();

  running = true;
  endTime = Date.now() + totalDuration * 1000;

  timer = setInterval(update, 200);
}

function stopTimer(){
  clearInterval(timer);
  running = false;
}

function update(){
  let left = Math.max(0, Math.floor((endTime - Date.now())/1000));
  let elapsed = totalDuration - left;

  document.getElementById("time").textContent =
    `${Math.floor(left/60)}:${String(left%60).padStart(2,'0')}`;

  // grey (elapsed)
  greyBar.style.width = (elapsed/totalDuration)*100 + "%";

  // phase split
  if(left > writingDuration){
    let rLeft = left - writingDuration;
    readingBar.style.width = (rLeft/readingDuration)*100 + "%";
    writingBar.style.width = "0%";
  } else {
    readingBar.style.width = "0%";
    writingBar.style.width = (left/writingDuration)*100 + "%";
  }

  // alerts
  if(left<=300 && left>120 && !fiveDone){ fiveDone=true; burst(5,880); }
  if(left<=120 && left>60 && !twoDone){ twoDone=true; burst(2,880); }
  if(left<=60 && left>0 && !oneDone){ oneDone=true; burst(1,880); }

  if(left<=0){
    clearInterval(timer);
    continuousAlert();
  }
}

/* ================= ALERTS ================= */
let loop;

function flash(){
  widget.classList.remove("flash");
  void widget.offsetWidth;
  widget.classList.add("flash");
  beep(0.15, 880);
}

function burst(n){
  let i=0;
  let t=setInterval(()=>{
    flash();
    i++;
    if(i>=n) clearInterval(t);
  },300);
}

function continuousAlert(){
  if(loop) return;
  loop=setInterval(flash, 400);
}

/* ================= FULLSCREEN ================= */
function toggleFullscreen(){
  if(!document.fullscreenElement){
    document.documentElement.requestFullscreen();
  } else {
    document.exitFullscreen();
  }
}

</script>

</body>
</html>
