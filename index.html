<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Exam Timer</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #111;
    color: #fff;
    text-align: center;
  }

  #topbar {
    display: flex;
    justify-content: space-between;
    padding: 14px 24px;
    font-size: 14px;
  }

  #lock img {
    width: 30px;
    height: 30px;
    cursor: pointer;
  }

  .timer {
    font-size: 76px;
    margin: 10px 0 20px;
  }

  #barContainer {
    width: 80%;
    height: 16px;
    margin: 20px auto;
    background: #222;
    border-radius: 8px;
    overflow: hidden;
    position: relative;
  }

  #greyBar {
    position: absolute;
    right: 0;
    top: 0;
    height: 100%;
    background: #444;
    width: 0%;
  }

  #readingBar {
    position: absolute;
    left: 0;
    top: 0;
    height: 100%;
    background: #2ecc71;
    width: 100%;
  }

  #writingBar {
    position: absolute;
    right: 0;
    top: 0;
    height: 100%;
    background: #3498db;
    width: 0%;
  }

  button {
    margin: 8px;
    padding: 12px 20px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
  }

  .play { background:#2ecc71; }
  .stop { background:#e74c3c; color:white; }

  .flash {
    animation: flash 0.25s alternate 2;
  }

  @keyframes flash {
    0% { background:#111; }
    100% { background:#8b0000; }
  }
</style>
</head>

<body>

<div class="timer" id="mainTimer">00:00</div>

<div id="barContainer">
  <div id="greyBar"></div>
  <div id="readingBar"></div>
  <div id="writingBar"></div>
</div>

<button class="play" id="mainBtn" onclick="startPause()">Start</button>
<button class="stop" onclick="stopTimer()">Stop</button>

<script>

/* ================= AUDIO ================= */
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function beep(freq=800, time=0.15){
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.frequency.value = freq;
  g.gain.value = 0.2;
  o.start();
  setTimeout(()=>o.stop(), time*1000);
}

/* ================= STATE ================= */
let timer;
let startTime;
let endTime;
let pauseOffset = 0;

let reading = 90 * 60;
let writing = 10 * 60;
let total = reading + writing;

let running = false;
let paused = false;

/* alerts */
let a5=false, a2=false, a1=false;

/* ================= CONTROL ================= */
function startPause(){

  if(!running){
    start();
  }
  else if(!paused){
    pause();
  }
  else {
    resume();
  }
}

function start(){
  running = true;
  paused = false;

  startTime = Date.now();
  endTime = startTime + total*1000;

  mainBtn.textContent = "Pause";

  timer = setInterval(update, 1000);
}

function pause(){
  paused = true;
  clearInterval(timer);
  pauseOffset = endTime - Date.now();
  mainBtn.textContent = "Resume";
}

function resume(){
  paused = false;
  endTime = Date.now() + pauseOffset;
  timer = setInterval(update, 1000);
  mainBtn.textContent = "Pause";
}

function stopTimer(){
  clearInterval(timer);
  running=false;
  paused=false;

  mainTimer.textContent="00:00";
  mainBtn.textContent="Start";

  resetBars();
}

function resetBars(){
  greyBar.style.width="0%";
  readingBar.style.width="100%";
  writingBar.style.width="0%";
}

/* ================= CORE LOGIC ================= */
function update(){

  let left = Math.max(0, Math.floor((endTime - Date.now())/1000));
  let elapsed = total - left;

  greyBar.style.width = (elapsed/total)*100 + "%";

  /* ===== PHASE SPLIT ===== */
  if(left > writing){

    let readingLeft = left - writing;

    mainTimer.textContent = format(readingLeft);

    readingBar.style.width = (readingLeft/reading)*100 + "%";
    writingBar.style.width = "0%";
  }
  else {

    mainTimer.textContent = format(left);

    readingBar.style.width = "0%";
    writingBar.style.width = (left/writing)*100 + "%";
  }

  /* ===== ALERTS ===== */
  if(left<=300 && !a5){ a5=true; flash(5); }
  if(left<=120 && !a2){ a2=true; flash(2); }
  if(left<=60 && !a1){ a1=true; flash(1); }

  if(left<=0){
    clearInterval(timer);
    mainTimer.textContent="00:00";
  }
}

/* ================= FLASH ================= */
function flash(n){
  document.body.classList.add("flash");
  beep(900);
  setTimeout(()=>document.body.classList.remove("flash"),300);
}

/* ================= FORMAT ================= */
function format(s){
  let m=Math.floor(s/60);
  let r=s%60;
  return String(m).padStart(2,'0')+":"+String(r).padStart(2,'0');
}

/* ================= BUTTON FIX ================= */
function startPause(){
  startPause(); // alias safety
}

</script>

</body>
</html>
