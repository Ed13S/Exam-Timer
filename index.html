<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Exam Timer</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #111;
    color: #fff;
    text-align: center;
  }

  #topbar {
    display: flex;
    justify-content: space-between;
    padding: 14px 24px;
    font-size: 14px;
  }

  #lock img {
    width: 30px;
    height: 30px;
    cursor: pointer;
  }

  h1 { margin: 10px 0; }

  .timer {
    font-size: 76px;
    margin: 10px 0 20px;
  }

  .container {
    display: flex;
    justify-content: center;
    gap: 80px;
    margin: 25px 0;
  }

  .box {
    border: 2px solid #333;
    padding: 25px;
    width: 240px;
    border-radius: 12px;
    background: #161616;
  }

  .reading-title { border-bottom: 3px solid #2ecc71; }
  .writing-title { border-bottom: 3px solid #3498db; }

  /* BAR */
  #barContainer {
    width: 80%;
    height: 16px;
    margin: 20px auto;
    background: #222;
    border-radius: 8px;
    overflow: hidden;
    position: relative;
  }

  /* elapsed */
  #greyBar {
    position: absolute;
    right: 0;
    top: 0;
    height: 100%;
    background: #444;
    width: 0%;
  }

  /* reading remaining */
  #readingBar {
    position: absolute;
    left: 0;
    top: 0;
    height: 100%;
    background: #2ecc71;
    width: 100%;
  }

  /* writing remaining */
  #writingBar {
    position: absolute;
    right: 0;
    top: 0;
    height: 100%;
    background: #3498db;
    width: 0%;
  }

  button {
    margin: 8px;
    padding: 14px 22px;
    font-size: 16px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
  }

  .play { background: #2ecc71; color: black; }
  .stop { background: #e74c3c; color: white; }

  .input-grid {
    display: flex;
    justify-content: center;
    gap: 140px;
    margin-top: 40px;
  }

  input {
    padding: 14px;
    width: 140px;
    font-size: 16px;
    border-radius: 8px;
    border: none;
    text-align: center;
    background: #222;
    color: white;
  }
</style>
</head>

<body>

<div id="topbar">
  <div>Eddie Singh</div>
  <div id="lock" onclick="toggleFullscreen()">
    <img src="https://w0.peakpx.com/wallpaper/488/103/HD-wallpaper-locked-black-dont-edge-galaxy-lock-logo-phone-sad-white.jpg">
  </div>
</div>

<h1>Exam Timer</h1>

<div class="container">
  <div class="box">
    <h2><span class="reading-title">Reading</span></h2>
    <p id="readingTime">00:00</p>
  </div>

  <div class="box">
    <h2><span class="writing-title">Writing</span></h2>
    <p id="writingTime">00:00</p>
  </div>
</div>

<div class="timer" id="mainTimer">00:00</div>

<div id="barContainer">
  <div id="greyBar"></div>
  <div id="readingBar"></div>
  <div id="writingBar"></div>
</div>

<div>
  <button onclick="selectSession(60,10)">60 + 10</button>
  <button onclick="selectSession(50,5)">50 + 5</button>
  <button onclick="selectSession(90,10)">90 + 10</button>
</div>

<button class="play" id="mainBtn" onclick="startPauseButton()">▶ Start</button>
<button class="stop" onclick="stopTimer()">Stop</button>

<div class="input-grid">
  <div>
    <h3>Reading (min)</h3>
    <input id="readInput" type="number">
  </div>

  <div>
    <h3>Writing (min)</h3>
    <input id="writeInput" type="number">
  </div>
</div>

<button onclick="applyCustom()">Apply</button>

<script>

/* ================= STATE ================= */
let timer, endTime;
let readingDuration = 0;
let writingDuration = 0;
let totalDuration = 0;

let running = false;
let paused = false;
let remaining = 0;

/* ================= HELPERS ================= */
function toSec(m){ return Math.round(parseFloat(m||0)*60); }

function format(s){
  let m = Math.floor(s/60);
  let sec = s % 60;
  return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}

/* ================= SESSION ================= */
function selectSession(r, w){
  readingDuration = toSec(r);
  writingDuration = toSec(w);
  totalDuration = readingDuration + writingDuration;

  readingTime.textContent = format(readingDuration);
  writingTime.textContent = format(writingDuration);

  resetBars();
}

function applyCustom(){
  selectSession(readInput.value, writeInput.value);
}

function resetBars(){
  greyBar.style.width = "0%";
  readingBar.style.width = "100%";
  writingBar.style.width = "0%";
}

/* ================= TIMER ================= */
function startPauseButton(){
  if(!running) startTimer();
  else if(!paused) pauseTimer();
  else resumeTimer();
}

function startTimer(){
  if(!readingDuration || !writingDuration) return;

  running = true;
  paused = false;

  endTime = Date.now() + totalDuration * 1000;

  mainBtn.textContent = "⏸ Pause";

  timer = setInterval(update, 200);
}

function pauseTimer(){
  paused = true;
  clearInterval(timer);
  remaining = endTime - Date.now();
}

function resumeTimer(){
  paused = false;
  endTime = Date.now() + remaining;
  timer = setInterval(update, 200);
}

function stopTimer(){
  running = false;
  paused = false;
  clearInterval(timer);

  mainTimer.textContent = "00:00";
  mainBtn.textContent = "▶ Start";

  resetBars();
}

/* ================= UPDATE (FIXED PHASE LOGIC) ================= */
function update(){
  let left = Math.max(0, Math.floor((endTime - Date.now()) / 1000));
  let elapsed = totalDuration - left;

  greyBar.style.width = (elapsed / totalDuration) * 100 + "%";

  /* ========== READING PHASE ========== */
  if(left > writingDuration){
    let readingLeft = left - writingDuration;

    mainTimer.textContent = format(readingLeft);

    readingBar.style.width = (readingLeft / readingDuration) * 100 + "%";
    writingBar.style.width = "0%";
  }

  /* ========== WRITING PHASE ========== */
  else {
    let writingLeft = left;

    mainTimer.textContent = format(writingLeft);

    readingBar.style.width = "0%";
    writingBar.style.width = (writingLeft / writingDuration) * 100 + "%";
  }

  if(left <= 0){
    clearInterval(timer);
    mainTimer.textContent = "00:00";
  }
}

/* ================= FULLSCREEN ================= */
function toggleFullscreen(){
  if(!document.fullscreenElement){
    document.documentElement.requestFullscreen();
  } else {
    document.exitFullscreen();
  }
}

</script>

</body>
</html>
